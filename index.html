<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarsCal - GPA, SGPA & CGPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-700">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-blue-600 to-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-lg">M</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight">MarsCal</h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 -mt-1">Academic Performance Calculator</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" id="theme-toggle" 
                            class="p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                        <i class="fas fa-moon text-xl"></i>
                    </button>
                    <button onclick="exportToPDF()" 
                            class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium transition-all shadow-md">
                        <i class="fas fa-download"></i>
                        <span>Export PDF</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row">
            <!-- Sidebar -->
            <div class="lg:w-96 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 p-6 lg:min-h-screen overflow-auto">
                <!-- Student Info -->
                <div class="mb-8">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i class="fas fa-user-circle"></i> Student Information</h2>
                    <div class="space-y-4">
                        <input id="student-name" type="text" placeholder="Full Name" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                    </div>
                </div>

                <!-- Grading System -->
                <div class="mb-8">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i class="fas fa-graduation-cap"></i> Grading System</h2>
                    <select id="grading-system" onchange="changeGradingSystem()" 
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none bg-white dark:bg-gray-800">
                    </select>
                </div>

                <!-- Credit Mode -->
                <div>
                    <h2 class="text-lg font-semibold mb-4">Credit System</h2>
                    <div class="flex gap-3">
                        <button onclick="setCreditMode('equal')" id="equal-btn"
                                class="flex-1 py-4 rounded-2xl border-2 font-medium transition-all">Equal Credit</button>
                        <button onclick="setCreditMode('variable')" id="variable-btn"
                                class="flex-1 py-4 rounded-2xl border-2 font-medium transition-all">Variable Credit</button>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-6 lg:p-8">
                <!-- Tabs -->
                <div class="flex border-b border-gray-200 dark:border-gray-700 mb-8">
                    <button onclick="showTab(0)" class="tab-btn active px-8 py-4 font-semibold">Semesters</button>
                    <button onclick="showTab(1)" class="tab-btn px-8 py-4 font-semibold">Charts</button>
                    <button onclick="showTab(2)" class="tab-btn px-8 py-4 font-semibold">Convert</button>
                </div>

                <!-- Semesters Tab -->
                <div id="tab-0" class="tab-content">
                    <div id="semesters-container" class="space-y-8"></div>
                    <button onclick="addSemester()" 
                            class="mt-8 w-full py-6 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-3xl text-gray-500 hover:text-blue-600 hover:border-blue-300 flex items-center justify-center gap-3 text-lg">
                        <i class="fas fa-plus"></i> Add New Semester
                    </button>
                </div>

                <!-- Charts Tab -->
                <div id="tab-1" class="tab-content hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm">
                            <h3 class="font-semibold mb-4">Grade Distribution</h3>
                            <canvas id="pieChart" height="300"></canvas>
                        </div>
                        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm">
                            <h3 class="font-semibold mb-4">GPA Trend</h3>
                            <canvas id="lineChart" height="300"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Convert Tab -->
                <div id="tab-2" class="tab-content hidden">
                    <div class="bg-white dark:bg-gray-900 rounded-3xl p-8">
                        <h3 class="font-semibold mb-6">Result Conversion</h3>
                        <p class="text-gray-500">Select target grading system to convert</p>
                    </div>
                </div>

                <!-- Summary Card -->
                <div class="mt-12 bg-gradient-to-br from-blue-500 to-violet-600 text-white rounded-3xl p-8 shadow-xl">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                        <div>
                            <div id="cgpa-display" class="text-5xl font-bold">0.00</div>
                            <div class="text-sm opacity-75">CGPA</div>
                        </div>
                        <div>
                            <div id="total-credits" class="text-5xl font-bold">0</div>
                            <div class="text-sm opacity-75">Total Credits</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3"></div>

    <script>
        // ============================================================
        // GRADING SYSTEMS (as requested)
        // ============================================================
        const GRADING_SYSTEMS = {
            'Bangladesh (5.00 Scale)': {
                'A+': 5.00, 'A': 4.50, 'A-': 4.00,
                'B+': 3.50, 'B': 3.00, 'B-': 2.50,
                'C+': 2.00, 'C': 1.50, 'D': 1.00, 'F': 0.00
            },
            'Bangladesh (4.00 Scale)': {
                'A+': 4.00, 'A': 3.75, 'A-': 3.50,
                'B+': 3.25, 'B': 3.00, 'B-': 2.75,
                'C+': 2.50, 'C': 2.25, 'D': 2.00, 'F': 0.00
            },
            'India (10.00 Scale)': {
                'O': 10.0, 'A+': 9.0, 'A': 8.0,
                'B+': 7.0, 'B': 6.0, 'C': 5.0,
                'D': 4.0, 'F': 0.0
            },
            'Pakistan (4.00 Scale)': {
                'A+': 4.00, 'A': 3.70, 'A-': 3.30,
                'B+': 3.00, 'B': 2.70, 'B-': 2.30,
                'C+': 2.00, 'C': 1.70, 'C-': 1.30,
                'D': 1.00, 'F': 0.00
            },
            'United States (4.00 Scale)': {
                'A+': 4.00, 'A': 4.00, 'A-': 3.70,
                'B+': 3.30, 'B': 3.00, 'B-': 2.70,
                'C+': 2.30, 'C': 2.00, 'C-': 1.70,
                'D+': 1.30, 'D': 1.00, 'F': 0.00
            },
            'United Kingdom': {
                'First': 4.00, 'Upper Second': 3.50, 'Lower Second': 3.00,
                'Third': 2.00, 'Pass': 1.00, 'Fail': 0.00
            },
            'Europe (ECTS)': {
                'A': 5.00, 'B': 4.00, 'C': 3.00,
                'D': 2.00, 'E': 1.00, 'F': 0.00
            },
            'China (Common 4.00 Scale)': {
                'A+': 4.00, 'A': 3.70, 'A-': 3.30,
                'B+': 3.00, 'B': 2.70, 'B-': 2.30,
                'C+': 2.00, 'C': 1.70, 'C-': 1.30,
                'D+': 1.00, 'D': 0.70, 'F': 0.00
            },
            'South Korea (4.30 Scale)': {
                'A+': 4.30, 'A0': 4.00, 'A-': 3.70,
                'B+': 3.30, 'B0': 3.00, 'B-': 2.70,
                'C+': 2.30, 'C0': 2.00, 'C-': 1.70,
                'D+': 1.30, 'D0': 1.00, 'F': 0.00
            },
            'Malaysia (4.00 Scale)': {
                'A+': 4.00, 'A': 3.70, 'A-': 3.30,
                'B+': 3.00, 'B': 2.70, 'B-': 2.30,
                'C+': 2.00, 'C': 1.70, 'C-': 1.30,
                'D+': 1.00, 'D': 0.70, 'F': 0.00
            },
            'Custom Grading System': {
                'A+': 4.00, 'A': 3.70, 'A-': 3.30,
                'B+': 3.00, 'B': 2.70, 'B-': 2.30,
                'C+': 2.00, 'C': 1.70, 'C-': 1.30,
                'D+': 1.00, 'D': 0.70, 'F': 0.00
            }
        };

        // ============================================================
        // STATE
        // ============================================================
        let currentGrading = 'Bangladesh (5.00 Scale)';
        let gradeMap = GRADING_SYSTEMS[currentGrading];
        let semesters = [];
        let creditMode = 'equal';
        let semesterCounter = 0;
        let pieChartInstance = null;
        let lineChartInstance = null;

        // ============================================================
        // CORE FUNCTIONS
        // ============================================================
        function getGradePoint(grade) {
            return gradeMap[grade] !== undefined ? gradeMap[grade] : 0;
        }

        function calculateGPA(courses) {
            if (!courses || courses.length === 0) return 0;
            let totalPoints = 0, totalCredits = 0;
            courses.forEach(c => {
                let cr = creditMode === 'equal' ? 1 : (parseFloat(c.credit) || 1);
                let gp = getGradePoint(c.grade);
                totalPoints += gp * cr;
                totalCredits += cr;
            });
            return totalCredits === 0 ? 0 : (totalPoints / totalCredits);
        }

        function calculateCGPA() {
            let totalPoints = 0, totalCredits = 0;
            semesters.forEach(sem => {
                (sem.courses || []).forEach(c => {
                    let cr = creditMode === 'equal' ? 1 : (parseFloat(c.credit) || 1);
                    let gp = getGradePoint(c.grade);
                    totalPoints += gp * cr;
                    totalCredits += cr;
                });
            });
            return totalCredits === 0 ? 0 : (totalPoints / totalCredits);
        }

        function totalCreditsAll() {
            let sum = 0;
            semesters.forEach(sem => {
                (sem.courses || []).forEach(c => {
                    sum += creditMode === 'equal' ? 1 : (parseFloat(c.credit) || 1);
                });
            });
            return sum;
        }

        // ============================================================
        // STORAGE
        // ============================================================
        function saveState() {
            try {
                const data = { semesters, creditMode, currentGrading };
                localStorage.setItem('marsCalState', JSON.stringify(data));
            } catch(e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('marsCalState');
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (data.semesters) semesters = data.semesters;
                if (data.creditMode) creditMode = data.creditMode;
                if (data.currentGrading) {
                    currentGrading = data.currentGrading;
                    gradeMap = GRADING_SYSTEMS[currentGrading] || GRADING_SYSTEMS['Bangladesh (5.00 Scale)'];
                }
                return true;
            } catch(e) { return false; }
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderSemesters() {
            const container = document.getElementById('semesters-container');
            if (!container) return;
            container.innerHTML = '';
            semesters.forEach((sem, idx) => {
                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-gray-900 rounded-3xl p-5 border border-gray-200 dark:border-gray-700';
                div.dataset.index = idx;
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-grip-vertical text-gray-400 cursor-grab handle"></i>
                            <span class="font-semibold">Semester ${idx+1}</span>
                            <input type="text" value="${sem.name || ''}" placeholder="e.g. Fall 2026" 
                                   class="bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-1 text-sm w-36 focus:outline-none focus:border-blue-500">
                        </div>
                        <div class="flex gap-2">
                            <span class="text-sm text-gray-500">GPA: <strong>${calculateGPA(sem.courses).toFixed(2)}</strong></span>
                            <button onclick="removeSemester(${idx})" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${(sem.courses || []).map((c, ci) => `
                            <div class="flex items-center gap-3 course-row" data-sem="${idx}" data-ci="${ci}">
                                <input type="text" value="${c.name || ''}" placeholder="Course" class="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                                <select class="bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none grade-select">
                                    ${Object.keys(gradeMap).map(g => `<option value="${g}" ${c.grade===g?'selected':''}>${g}</option>`).join('')}
                                </select>
                                ${creditMode === 'variable' ? `<input type="number" value="${c.credit || 1}" min="0.5" step="0.5" class="w-16 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-2 py-2 text-sm focus:outline-none credit-input">` : ''}
                                <button onclick="removeCourse(${idx}, ${ci})" class="text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addCourse(${idx})" class="mt-3 text-sm text-gray-500 hover:text-blue-600 flex items-center gap-2"><i class="fas fa-plus"></i> Add course</button>
                `;
                container.appendChild(div);
            });

            // Event listeners
            document.querySelectorAll('.course-row').forEach(row => {
                const semIdx = parseInt(row.dataset.sem);
                const ci = parseInt(row.dataset.ci);
                const nameInput = row.querySelector('input[type="text"]');
                const gradeSelect = row.querySelector('.grade-select');
                const creditInput = row.querySelector('.credit-input');
                if (nameInput) {
                    nameInput.addEventListener('change', function() {
                        if (semesters[semIdx] && semesters[semIdx].courses[ci]) {
                            semesters[semIdx].courses[ci].name = this.value;
                            saveState(); updateSummary();
                        }
                    });
                }
                if (gradeSelect) {
                    gradeSelect.addEventListener('change', function() {
                        if (semesters[semIdx] && semesters[semIdx].courses[ci]) {
                            semesters[semIdx].courses[ci].grade = this.value;
                            saveState(); updateSummary(); renderSemesters();
                        }
                    });
                }
                if (creditInput) {
                    creditInput.addEventListener('change', function() {
                        if (semesters[semIdx] && semesters[semIdx].courses[ci]) {
                            semesters[semIdx].courses[ci].credit = parseFloat(this.value) || 1;
                            saveState(); updateSummary(); renderSemesters();
                        }
                    });
                }
            });

            container.querySelectorAll('.bg-white, .bg-gray-900').forEach((semDiv, idx) => {
                const nameInput = semDiv.querySelector('input[type="text"]');
                if (nameInput && semesters[idx]) {
                    nameInput.value = semesters[idx].name || '';
                    nameInput.addEventListener('change', function() {
                        semesters[idx].name = this.value;
                        saveState();
                    });
                }
            });

            updateSummary();
            updateCharts();
            saveState();
        }

        function updateSummary() {
            const cgpa = calculateCGPA();
            document.getElementById('cgpa-display').textContent = cgpa.toFixed(2);
            document.getElementById('total-credits').textContent = totalCreditsAll();
        }

        // ============================================================
        // SEMESTER / COURSE MANAGEMENT
        // ============================================================
        function addSemester() {
            semesters.push({ id: semesterCounter++, name: `Sem ${semesters.length+1}`, courses: [] });
            renderSemesters();
            updateCharts();
        }

        function removeSemester(idx) {
            if (semesters.length <= 1) { showToast('At least one semester needed'); return; }
            semesters.splice(idx, 1);
            renderSemesters();
            updateCharts();
        }

        function addCourse(semIdx) {
            if (!semesters[semIdx]) return;
            const firstGrade = Object.keys(gradeMap)[0] || 'A';
            semesters[semIdx].courses.push({ name: 'New course', grade: firstGrade, credit: 1 });
            renderSemesters();
            updateCharts();
        }

        function removeCourse(semIdx, ci) {
            if (!semesters[semIdx]) return;
            semesters[semIdx].courses.splice(ci, 1);
            renderSemesters();
            updateCharts();
        }

        // ============================================================
        // GRADING SYSTEM & CREDIT MODE
        // ============================================================
        function changeGradingSystem() {
            const sel = document.getElementById('grading-system');
            currentGrading = sel.value;
            gradeMap = GRADING_SYSTEMS[currentGrading] || GRADING_SYSTEMS['Bangladesh (5.00 Scale)'];
            renderSemesters();
            updateCharts();
            saveState();
        }

        function setCreditMode(mode) {
            creditMode = mode;
            document.getElementById('equal-btn').className = `flex-1 py-4 rounded-2xl border-2 font-medium transition-all ${mode==='equal' ? 'border-blue-500 text-blue-600' : 'border-gray-300 dark:border-gray-600'}`;
            document.getElementById('variable-btn').className = `flex-1 py-4 rounded-2xl border-2 font-medium transition-all ${mode==='variable' ? 'border-blue-500 text-blue-600' : 'border-gray-300 dark:border-gray-600'}`;
            renderSemesters();
            updateCharts();
            saveState();
        }

        // ============================================================
        // CHARTS
        // ============================================================
        function updateCharts() {
            const gradeCount = {};
            semesters.forEach(sem => {
                (sem.courses || []).forEach(c => {
                    const g = c.grade || 'A';
                    gradeCount[g] = (gradeCount[g] || 0) + 1;
                });
            });
            const labels = Object.keys(gradeCount);
            const data = Object.values(gradeCount);
            const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#6366f1','#14b8a6','#f97316','#8b5cf6'];

            const pieCtx = document.getElementById('pieChart');
            if (pieCtx) {
                if (pieChartInstance) pieChartInstance.destroy();
                pieChartInstance = new Chart(pieCtx, {
                    type: 'pie',
                    data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderColor: '#fff', borderWidth: 2 }] },
                    options: { responsive: true }
                });
            }

            const lineCtx = document.getElementById('lineChart');
            if (lineCtx) {
                if (lineChartInstance) lineChartInstance.destroy();
                const semGpas = semesters.map(sem => calculateGPA(sem.courses));
                const maxGPA = Math.max(4.5, ...semGpas.map(g => g + 0.5));
                lineChartInstance = new Chart(lineCtx, {
                    type: 'line',
                    data: { labels: semesters.map((_,i) => `Sem ${i+1}`), datasets: [{ label: 'GPA', data: semGpas, borderColor: '#3b82f6', backgroundColor: '#3b82f620', fill: true, tension: 0.3 }] },
                    options: { responsive: true, scales: { y: { min: 0, max: Math.ceil(maxGPA) } } }
                });
            }
        }

        // ============================================================
        // TABS
        // ============================================================
        function showTab(idx) {
            document.querySelectorAll('.tab-content').forEach((el, i) => {
                el.classList.toggle('hidden', i !== idx);
            });
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === idx);
            });
            if (idx === 1) setTimeout(updateCharts, 100);
        }

        // ============================================================
        // MISC
        // ============================================================
        function exportToPDF() {
            showToast('PDF export ready');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const icon = document.querySelector('#theme-toggle i');
            if (document.body.classList.contains('dark')) {
                icon.className = 'fas fa-sun text-xl';
            } else {
                icon.className = 'fas fa-moon text-xl';
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            t.classList.remove('hidden');
            clearTimeout(t._hide);
            t._hide = setTimeout(() => t.classList.add('hidden'), 2500);
        }

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            const sel = document.getElementById('grading-system');
            sel.innerHTML = Object.keys(GRADING_SYSTEMS).map(k => `<option value="${k}">${k}</option>`).join('');
            sel.value = currentGrading;

            const loaded = loadState();
            if (!loaded) {
                semesters = [
                    { id: semesterCounter++, name: 'Fall 2025', courses: [{ name: 'Math', grade: 'A', credit: 3 }, { name: 'Physics', grade: 'B+', credit: 3 }] },
                    { id: semesterCounter++, name: 'Spring 2026', courses: [{ name: 'Chemistry', grade: 'A-', credit: 3 }, { name: 'Biology', grade: 'B', credit: 3 }] }
                ];
            }
            semesters.forEach(sem => {
                (sem.courses || []).forEach(c => { if (c.credit === undefined) c.credit = 1; });
            });

            setCreditMode(creditMode);
            renderSemesters();
            updateCharts();

            const container = document.getElementById('semesters-container');
            if (container) {
                Sortable.create(container, {
                    handle: '.handle',
                    animation: 200,
                    onEnd: function(evt) {
                        const [removed] = semesters.splice(evt.oldIndex, 1);
                        semesters.splice(evt.newIndex, 0, removed);
                        renderSemesters();
                        updateCharts();
                        saveState();
                    }
                });
            }

            sel.addEventListener('change', changeGradingSystem);
        }

        // Make functions global
        window.addSemester = addSemester;
        window.removeSemester = removeSemester;
        window.addCourse = addCourse;
        window.removeCourse = removeCourse;
        window.changeGradingSystem = changeGradingSystem;
        window.setCreditMode = setCreditMode;
        window.showTab = showTab;
        window.exportToPDF = exportToPDF;
        window.toggleTheme = toggleTheme;

        init();
    </script>
</body>
</html>
