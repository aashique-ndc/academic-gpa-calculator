<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marscal - GPA, SGPA & CGPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="sticky top-0 bg-white dark:bg-gray-900 shadow-md z-50">
            <div class="px-8 py-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="text-4xl font-bold text-blue-600">M</div>
                    <h1 class="text-3xl font-bold">Marscal</h1>
                </div>
                <button onclick="toggleTheme()" class="text-2xl p-3">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row">
            <!-- Sidebar -->
            <div class="lg:w-96 bg-white dark:bg-gray-900 p-8 border-r">
                <h2 class="text-xl font-semibold mb-6">Grading System</h2>
                <select id="grading-system" onchange="changeGradingSystem()" 
                        class="w-full p-4 border rounded-2xl text-lg mb-8">
                </select>

                <h2 class="text-xl font-semibold mb-6">Credit System</h2>
                <div class="flex gap-4">
                    <button onclick="setCreditMode('equal')" 
                            class="flex-1 py-5 border-2 rounded-3xl font-medium">Equal Credit</button>
                    <button onclick="setCreditMode('variable')" 
                            class="flex-1 py-5 border-2 rounded-3xl font-medium">Variable Credit</button>
                </div>
            </div>

            <!-- Main Area -->
            <div class="flex-1 p-8">
                <button onclick="addSemester()" 
                        class="w-full py-6 bg-blue-600 hover:bg-blue-700 text-white text-xl font-medium rounded-3xl mb-10 flex items-center justify-center gap-3">
                    <i class="fas fa-plus"></i> Add New Semester
                </button>

                <div id="semesters-container" class="space-y-8"></div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
