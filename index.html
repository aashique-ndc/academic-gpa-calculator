<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarsCal - GPA, SGPA & CGPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .tab-btn.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .tab-btn { transition: all 0.2s; padding: 12px 24px; font-weight: 600; cursor: pointer; }
        .tab-content { display: block; }
        .tab-content.hidden { display: none; }
        .grade-select, .credit-input { background: #f9fafb; }
        .dark .grade-select, .dark .credit-input { background: #1f2937; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-700 no-print">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-blue-600 to-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-lg">M</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight">MarsCal</h1>
                        <p class="text-sm text-gray-500 dark:text-gray-400 -mt-1">Academic Performance Calculator</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 no-print">
                    <button onclick="toggleTheme()" id="theme-toggle" 
                            class="p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                        <i class="fas fa-moon text-xl"></i>
                    </button>
                    <button onclick="exportToPDF()" 
                            class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium transition-all shadow-md">
                        <i class="fas fa-download"></i>
                        <span>Export PDF</span>
                    </button>
                    <button onclick="printTranscript()" 
                            class="flex items-center gap-2 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-medium transition-all shadow-md">
                        <i class="fas fa-print"></i>
                        <span>Print</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row">
            <!-- Sidebar -->
            <div class="lg:w-96 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 p-6 lg:min-h-screen overflow-auto no-print">
                <!-- Student Info - Expanded -->
                <div class="mb-8">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i class="fas fa-user-circle"></i> Student Information</h2>
                    <div class="space-y-3">
                        <input id="student-name" type="text" placeholder="Full Name" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                        <input id="student-institution" type="text" placeholder="Institution Name" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                        <input id="student-board" type="text" placeholder="Board" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                        <input id="student-subject" type="text" placeholder="Subject/Group" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="student-roll" type="text" placeholder="Roll" 
                                   class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                            <input id="student-registration" type="text" placeholder="Registration" 
                                   class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                        </div>
                        <input id="student-exam-name" type="text" placeholder="Examination Name" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                        <input id="student-exam-year" type="text" placeholder="Examination Year" 
                               class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                    </div>
                </div>

                <!-- Grading System -->
                <div class="mb-8">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i class="fas fa-graduation-cap"></i> Grading System</h2>
                    <select id="grading-system" onchange="changeGradingSystem()" 
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none bg-white dark:bg-gray-800">
                    </select>
                </div>

                <!-- Credit Mode -->
                <div>
                    <h2 class="text-lg font-semibold mb-4">Credit System</h2>
                    <div class="flex gap-3">
                        <button onclick="setCreditMode('equal')" id="equal-btn"
                                class="flex-1 py-4 rounded-2xl border-2 font-medium transition-all border-blue-500 text-blue-600">Equal Credit</button>
                        <button onclick="setCreditMode('variable')" id="variable-btn"
                                class="flex-1 py-4 rounded-2xl border-2 font-medium transition-all border-gray-300 dark:border-gray-600">Variable Credit</button>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-6 lg:p-8">
                <!-- Tabs -->
                <div class="flex border-b border-gray-200 dark:border-gray-700 mb-8 no-print">
                    <button onclick="showTab(0)" class="tab-btn active">Semesters</button>
                    <button onclick="showTab(1)" class="tab-btn">Charts</button>
                    <button onclick="showTab(2)" class="tab-btn">Convert</button>
                </div>

                <!-- Semesters Tab -->
                <div id="tab-0" class="tab-content">
                    <div id="semesters-container" class="space-y-8"></div>
                    <button onclick="addSemester()" 
                            class="mt-8 w-full py-6 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-3xl text-gray-500 hover:text-blue-600 hover:border-blue-300 flex items-center justify-center gap-3 text-lg no-print">
                        <i class="fas fa-plus"></i> Add New Semester
                    </button>
                </div>

                <!-- Charts Tab -->
                <div id="tab-1" class="tab-content hidden no-print">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm">
                            <h3 class="font-semibold mb-4">Grade Distribution</h3>
                            <canvas id="pieChart" height="300"></canvas>
                        </div>
                        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm">
                            <h3 class="font-semibold mb-4">GPA Trend</h3>
                            <canvas id="lineChart" height="300"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Convert Tab -->
                <div id="tab-2" class="tab-content hidden no-print">
                    <div class="bg-white dark:bg-gray-900 rounded-3xl p-8">
                        <h3 class="font-semibold mb-6">Result Conversion</h3>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Current CGPA: <span id="current-cgpa-display" class="font-bold text-blue-600">0.00</span></label>
                                <label class="block text-sm font-medium mb-2">Current Scale: <span id="current-scale-display" class="font-medium">Bangladesh (4.00 Scale)</span></label>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Convert to:</label>
                                <select id="convert-target" class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800">
                                </select>
                            </div>
                            <button onclick="convertResult()" 
                                    class="w-full py-3 bg-gradient-to-br from-blue-500 to-violet-600 text-white rounded-2xl font-medium hover:opacity-90 transition">
                                Convert Result
                            </button>
                            <div id="conversion-result" class="mt-4 p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl hidden">
                                <p class="text-sm text-gray-600 dark:text-gray-400">Converted CGPA: <span id="converted-cgpa" class="font-bold text-lg text-blue-600"></span></p>
                                <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Target Scale: <span id="target-scale-name" class="font-medium"></span></p>
                                <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Conversion Method: <span class="font-medium">Upper Bound Percentage Mapping</span></p>
                                <div id="conversion-details" class="mt-3 text-xs text-gray-500"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Summary Card -->
                <div class="mt-12 bg-gradient-to-br from-blue-500 to-violet-600 text-white rounded-3xl p-8 shadow-xl no-print">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                        <div>
                            <div id="cgpa-display" class="text-5xl font-bold">0.00</div>
                            <div class="text-sm opacity-75">CGPA</div>
                        </div>
                        <div>
                            <div id="total-credits" class="text-5xl font-bold">0</div>
                            <div class="text-sm opacity-75">Total Credits</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 no-print"></div>

    <!-- External JS Files -->
    <script src="constants.js"></script>
    <script src="gradingData.js"></script>
    <script src="studentInfo.js"></script>
    <script src="transcriptGenerator.js"></script>
    <script src="converter.js"></script>
    <script src="app.js"></script>
    <script src="export.js"></script>
    
    <!-- Fallback inline JS if external files fail -->
    <script>
        // Fallback: Make sure critical functions exist
        document.addEventListener('DOMContentLoaded', function() {
            // If app.js didn't load, show error
            if (typeof init === 'undefined') {
                console.error('app.js failed to load. Please check file paths.');
                showToast('Error: app.js not loaded. Please refresh.');
            }
            
            // Auto-save student info on input change
            document.querySelectorAll('[id^="student-"]').forEach(input => {
                input.addEventListener('change', function() {
                    if (typeof collectStudentInfoFromUI === 'function') {
                        collectStudentInfoFromUI();
                    }
                });
                input.addEventListener('keyup', function() {
                    if (typeof collectStudentInfoFromUI === 'function') {
                        collectStudentInfoFromUI();
                    }
                });
            });
        });
    </script>
</body>
</html>
